name: Deploy to Strato (SFTP)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-strato-sftp
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build static site
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build:static

      - name: Install rsync and sshpass
        run: sudo apt-get update && sudo apt-get install -y rsync sshpass openssh-client

      - name: Deploy via rsync with checksum comparison
        env:
          STRATO_SFTP_HOST: ${{ secrets.STRATO_SFTP_HOST }}
          STRATO_SFTP_PORT: ${{ secrets.STRATO_SFTP_PORT }}
          STRATO_SFTP_USER: ${{ secrets.STRATO_SFTP_USER }}
          STRATO_SFTP_PASSWORD: ${{ secrets.STRATO_SFTP_PASSWORD }}
          STRATO_SFTP_REMOTE_PATH: ${{ secrets.STRATO_SFTP_REMOTE_PATH }}
        run: |
          test -d out
          
          sshpass -p "$STRATO_SFTP_PASSWORD" rsync -avz --checksum --delete \
            -e "ssh -o StrictHostKeyChecking=accept-new -p ${STRATO_SFTP_PORT:-22}" \
            --exclude='.git*' \
            --exclude='.DS_Store' \
            --exclude='node_modules' \
            --exclude='.next' \
            out/ "$STRATO_SFTP_USER@$STRATO_SFTP_HOST:$STRATO_SFTP_REMOTE_PATH/"
